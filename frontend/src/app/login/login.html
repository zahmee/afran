<div class="auth-page">
  <!-- Brand Side -->
  <div class="brand-side">
    <div class="brand-content">
      <div class="brand-logo">
        <i class="pi pi-bolt"></i>
      </div>
      <h1 class="brand-name">افران</h1>
      <p class="brand-desc">نظام إدارة المبيعات</p>
    </div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Form Side -->
  <div class="form-side">
    <div class="form-container">
      <div class="form-header">
        <h2 class="form-title">مرحباً بعودتك</h2>
        <p class="form-subtitle">سجل دخولك للمتابعة</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="field">
          <label for="username">اسم المستخدم</label>
          <div class="input-wrapper">
            <i class="pi pi-user input-icon"></i>
            <input pInputText id="username" formControlName="username"
                   autocomplete="username" placeholder="أدخل اسم المستخدم" class="field-input" />
          </div>
        </div>

        <div class="field">
          <label for="password">كلمة المرور</label>
          <p-password id="password" formControlName="password"
                      [feedback]="false" [toggleMask]="true"
                      placeholder="أدخل كلمة المرور"
                      styleClass="full-width"
                      inputStyleClass="field-input" />
        </div>

        @if (error()) {
          <div class="error-banner">
            <i class="pi pi-exclamation-circle"></i>
            <span>{{ error() }}</span>
          </div>
        }

        <p-button type="submit" label="تسجيل الدخول" icon="pi pi-sign-in"
                  [loading]="loading()" [disabled]="form.invalid"
                  styleClass="full-width submit-btn" severity="primary" />
      </form>

      <div class="alt-link">
        ليس لديك حساب؟ <a routerLink="/register">إنشاء حساب جديد</a>
      </div>
    </div>
  </div>
</div>
