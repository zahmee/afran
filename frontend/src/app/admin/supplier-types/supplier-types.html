<div class="page">
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">أنواع الموردين</h1>
      <span class="count-badge">{{ types().length }} نوع</span>
    </div>
  </div>

  <!-- Add new type -->
  <div class="add-card">
    <form [formGroup]="addForm" (ngSubmit)="addType()" class="add-form">
      <div class="add-input-wrap">
        <i class="pi pi-tag add-icon"></i>
        <input pInputText formControlName="name" placeholder="اسم النوع الجديد (مثال: أسر منتجة)"
               class="add-input" />
      </div>
      <p-button type="submit" label="إضافة" icon="pi pi-plus"
                [loading]="saving()" [disabled]="addForm.invalid" />
    </form>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <i class="pi pi-spin pi-spinner spinner-icon"></i>
    </div>
  } @else {
    <div class="types-list">
      @for (type of types(); track type.id) {
        <div class="type-card">
          @if (deleteConfirmId() === type.id) {
            <div class="delete-overlay">
              <i class="pi pi-exclamation-triangle warn-icon"></i>
              <p>هل تريد حذف "{{ type.name }}"؟</p>
              <div class="delete-actions">
                <p-button label="حذف" icon="pi pi-trash" severity="danger"
                          size="small" (onClick)="executeDelete(type)" />
                <p-button label="إلغاء" severity="secondary" [text]="true"
                          size="small" (onClick)="cancelDelete()" />
              </div>
            </div>
          }

          @if (editingId() === type.id) {
            <form [formGroup]="editForm" (ngSubmit)="saveEdit(type)" class="edit-row">
              <input pInputText formControlName="name" class="edit-input" />
              <p-button type="submit" icon="pi pi-check" [text]="true" [rounded]="true"
                        size="small" [disabled]="editForm.invalid || saving()" />
              <p-button type="button" icon="pi pi-times" [text]="true" [rounded]="true"
                        size="small" severity="secondary" (onClick)="cancelEdit()" />
            </form>
          } @else {
            <div class="type-row">
              <div class="type-icon-wrap">
                <i class="pi pi-tag"></i>
              </div>
              <span class="type-name">{{ type.name }}</span>
              <div class="type-actions">
                <p-button icon="pi pi-pencil" [text]="true" [rounded]="true"
                          size="small" (onClick)="startEdit(type)" />
                <p-button icon="pi pi-trash" [text]="true" [rounded]="true"
                          size="small" severity="danger" (onClick)="confirmDelete(type)" />
              </div>
            </div>
          }
        </div>
      } @empty {
        <div class="empty-state">
          <i class="pi pi-tags empty-icon"></i>
          <p>لا توجد أنواع موردين بعد</p>
        </div>
      }
    </div>
  }
</div>
