services:

  backend:
    build: ./backend
    environment:
      PORT: "8000"
      RELOAD: "false"
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "sqlite+aiosqlite:////data/afran.db"
      CORS_ORIGINS: "http://localhost:8090"
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
